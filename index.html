        body { font-family: 'Inter', sans-serif; background-color: #f9f9ff; }

<body class="text-on-surface">
<!-- Top App Bar -->
<main class="max-w-[800px] mx-auto px-margin-mobile pt-10 pb-32">
<!-- Header Section -->
<section class="mb-section-padding text-center">
<h2 class="font-display-lg-mobile md:font-display-lg text-display-lg-mobile md:text-display-lg text-on-surface mb-4">Заказать рекламу</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-md mx-auto">Просто выберите тариф и опишите ваш продукт</p>
</section>
<!-- Step 1: Price Selection -->
<section class="mb-12">
<div class="flex items-center gap-2 mb-6">
<span class="w-8 h-8 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center font-label-md">1</span>
<h3 class="font-headline-sm text-headline-sm">Выберите тариф</h3>
</div>
<div class="grid grid-cols-1 md:grid-cols-3 gap-gutter">
<!-- Tier 1 -->
<button class="tier-card transition-all text-left bg-white border border-outline-variant rounded-xl p-6 custom-shadow hover:border-primary" onclick="selectTier('Базовый', '150 сом', this)">
<span class="material-symbols-outlined text-primary mb-4" style="font-variation-settings: 'FILL' 1;">bolt</span>
<div class="font-label-md text-outline uppercase tracking-wider mb-1">Базовый</div>
<div class="font-headline-md text-headline-md text-on-surface mb-2">150 сом</div>
<p class="font-body-sm text-body-sm text-on-surface-variant">Разовая публикация в ленте новостей.</p>
</button>
<!-- Tier 2 -->
<button class="tier-card transition-all text-left bg-white border border-outline-variant rounded-xl p-6 custom-shadow hover:border-primary" onclick="selectTier('Стандарт', '500 сом', this)">
<span class="material-symbols-outlined text-primary mb-4" style="font-variation-settings: 'FILL' 1;">stars</span>
<div class="font-label-md text-outline uppercase tracking-wider mb-1">Стандарт</div>
<div class="font-headline-md text-headline-md text-on-surface mb-2">500 сом</div>
<p class="font-body-sm text-body-sm text-on-surface-variant">Публикация + закрепление на 24 часа.</p>
</button>
<!-- Tier 3 -->
<button class="tier-card transition-all text-left bg-white border border-outline-variant rounded-xl p-6 custom-shadow hover:border-primary" onclick="selectTier('Премиум', '1000 сом', this)">
<span class="material-symbols-outlined text-primary mb-4" style="font-variation-settings: 'FILL' 1;">diamond</span>
<div class="font-label-md text-outline uppercase tracking-wider mb-1">Премиум</div>
<div class="font-headline-md text-headline-md text-on-surface mb-2">1000 сом</div>
<p class="font-body-sm text-body-sm text-on-surface-variant">Полный охват аудитории + рассылка.</p>
</button>
</div>
</section>
<!-- Step 2: Description -->
<section class="opacity-30 pointer-events-none transition-all duration-500" id="step-2">
<div class="flex items-center gap-2 mb-6">
<span class="w-8 h-8 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center font-label-md">2</span>
<h3 class="font-headline-sm text-headline-sm">Опишите продукт</h3>
</div>
<div class="bg-white border border-outline-variant rounded-xl p-6 custom-shadow">
<label class="block font-label-md text-on-surface-variant mb-2" for="description">Что именно рекламировать?</label>
<textarea class="w-full bg-surface-container-low border border-outline-variant rounded-lg p-4 focus:ring-2 focus:ring-primary focus:border-transparent outline-none font-body-md transition-all" id="description" placeholder="Напишите краткое описание вашего товара, услуги или канала..." rows="4"></textarea>
</div>
</section>
<!-- Image Decorative Section -->
<section class="mt-12 rounded-xl overflow-hidden custom-shadow h-64 relative">

<div class="absolute inset-0 bg-gradient-to-t from-on-surface/40 to-transparent"></div>
<div class="absolute bottom-6 left-6 text-white">
<p class="font-label-md uppercase tracking-widest opacity-80">Ваш успех начинается здесь</p>
<p class="font-headline-sm">Эффективное продвижение</p>
</div>
</section>
</main>
<!-- Bottom Action Bar -->
<div class="fixed bottom-0 left-0 w-full bg-surface border-t border-outline-variant px-margin-mobile py-4 z-50">
<div class="max-w-[800px] mx-auto flex items-center justify-between">
<div class="hidden md:block">
<p class="font-body-sm text-on-surface-variant" id="summary-text">Выберите тариф, чтобы продолжить</p>
</div>
<button class="w-full md:w-auto bg-primary text-white px-10 py-4 rounded-full font-label-md uppercase tracking-widest flex items-center justify-center gap-2 opacity-50 cursor-not-allowed active:scale-95 transition-all" disabled="" id="submit-btn" onclick="sendToWhatsApp()">
                Отправить
                <span class="material-symbols-outlined text-[18px]">send</span>
</button>
</div>
</div>
<!-- WhatsApp FAB (Hidden until tier selected) -->
<div class="fixed bottom-24 right-6 scale-0 transition-all duration-300" id="whatsapp-fab">
<button class="w-14 h-14 bg-[#25D366] text-white rounded-full flex items-center justify-center custom-shadow hover:scale-110 active:scale-90 transition-transform" onclick="sendToWhatsApp()">
<svg class="w-7 h-7 fill-current" viewbox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"></path></svg>
</button>
</div>
<script>
        let selectedTierName = "";
        let selectedPrice = "";

        function selectTier(name, price, element) {
            // Remove active class from all
            document.querySelectorAll('.tier-card').forEach(card => card.classList.remove('active'));
            
            // Add active class to selected
            element.classList.add('active');
            
            selectedTierName = name;
            selectedPrice = price;

            // Unlock Step 2
            const step2 = document.getElementById('step-2');
            step2.classList.remove('opacity-30', 'pointer-events-none');
            
            // Update Summary
            const summary = document.getElementById('summary-text');
            summary.innerText = `Выбрано: ${name} (${price})`;
            summary.classList.add('text-primary');

            // Enable Button
            const btn = document.getElementById('submit-btn');
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');

            // Show FAB
            document.getElementById('whatsapp-fab').classList.remove('scale-0');
        }

        function sendToWhatsApp() {
            const description = document.getElementById('description').value.trim();
            const phone = "996559553805";
            
            if (!selectedTierName) {
                alert("Пожалуйста, выберите тариф");
                return;
            }

            const message = `Здравствуйте! Хочу заказать рекламу.\n\n` +
                            `Тариф: ${selectedTierName}\n` +
                            `Цена: ${selectedPrice}\n` +
                            `Описание: ${description || "Не указано"}`;
            
            const encodedMessage = encodeURIComponent(message);
            window.open(`https://wa.me/${phone}?text=${encodedMessage}`, '_blank');
        }
    </script>
</body></html>
